# CodeMagic CI for Catalyst. App version: 6.0.0 (source of truth: pubspec.yaml).
workflows:

  # ── iOS IPA (unsigned — sideload via AltStore / Sideloadly) ────────────────
  # Uses flutter build ipa --no-codesign only. Do not attach Apple certificates
  # or App Store Connect integration to this workflow in the Codemagic UI, or
  # signing may be applied despite this flag.
  ios-release:
    name: iOS IPA v6.0.0 (unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get packages
        script: flutter pub get

      # Do not run `pod install` alone: Podfile reads FLUTTER_ROOT from
      # ios/Flutter/Generated.xcconfig. That file must match the builder’s Flutter
      # SDK (flutter pub get). `flutter build ipa` runs CocoaPods with the right paths.
      - name: Build IPA unsigned (no code signing)
        script: |
          set -e
          flutter build ipa --release --no-codesign

      - name: Prepare Catalyst.ipa artifact
        script: |
          set -e
          mkdir -p build/ios/ipa
          shopt -s nullglob
          ipas=(build/ios/ipa/*.ipa)
          if [ ${#ipas[@]} -gt 0 ]; then
            mv "${ipas[0]}" build/ios/ipa/Catalyst.ipa
          elif [ -d build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app ]; then
            echo "IPA missing from flutter output; packaging from xcarchive..."
            rm -rf /tmp/catalyst-ipa && mkdir -p /tmp/catalyst-ipa/Payload
            cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app /tmp/catalyst-ipa/Payload/
            (cd /tmp/catalyst-ipa && zip -qr "$CM_BUILD_DIR/build/ios/ipa/Catalyst.ipa" Payload)
          else
            echo "No .ipa or xcarchive app bundle found" >&2
            exit 1
          fi
          ls -lh build/ios/ipa/Catalyst.ipa

    artifacts:
      - build/ios/ipa/Catalyst.ipa
      - build/ios/archive/*.xcarchive

  # ── Android APKs ───────────────────────────────────────────────────────────
  android-release:
    name: Android APKs v6.0.0
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build release APKs
        script: flutter build apk --release --split-per-abi

    artifacts:
      - build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - build/app/outputs/flutter-apk/app-x86_64-release.apk

  # ── Both platforms — triggers automatically on v* tags ────────────────────
  all-release:
    name: iOS + Android v6.0.0 (unsigned IPA)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      java: 17
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build APKs
        script: flutter build apk --release --split-per-abi

      - name: Build IPA unsigned (no code signing)
        script: |
          set -e
          flutter build ipa --release --no-codesign

      - name: Prepare Catalyst.ipa artifact
        script: |
          set -e
          mkdir -p build/ios/ipa
          shopt -s nullglob
          ipas=(build/ios/ipa/*.ipa)
          if [ ${#ipas[@]} -gt 0 ]; then
            mv "${ipas[0]}" build/ios/ipa/Catalyst.ipa
          elif [ -d build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app ]; then
            echo "IPA missing from flutter output; packaging from xcarchive..."
            rm -rf /tmp/catalyst-ipa && mkdir -p /tmp/catalyst-ipa/Payload
            cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app /tmp/catalyst-ipa/Payload/
            (cd /tmp/catalyst-ipa && zip -qr "$CM_BUILD_DIR/build/ios/ipa/Catalyst.ipa" Payload)
          else
            echo "No .ipa or xcarchive app bundle found" >&2
            exit 1
          fi
          ls -lh build/ios/ipa/Catalyst.ipa

    artifacts:
      - build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - build/app/outputs/flutter-apk/app-x86_64-release.apk
      - build/ios/ipa/Catalyst.ipa
      - build/ios/archive/*.xcarchive

    # Note: Codemagic no longer allows publishing.github.repo / prerelease here.
    # For GitHub Releases, add GITHUB_TOKEN in the app’s Environment variables and
    # use a script with `gh release create` (see Codemagic “Github Releases” docs).
