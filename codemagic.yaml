workflows:

  # ── iOS IPA (unsigned — sideload via AltStore / Sideloadly) ────────────────
  ios-release:
    name: iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Set version from pubspec
        script: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          BUILD=$(grep "^version:" pubspec.yaml | awk '{print $2}' | cut -d+ -f2)
          echo "Building Catalyst $VERSION ($BUILD)"

      - name: Get packages
        script: flutter pub get

      - name: Build IPA (unsigned)
        script: flutter build ipa --release --no-codesign

      - name: Rename IPA
        script: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          mv build/ios/ipa/*.ipa "build/ios/ipa/Catalyst-${VERSION}.ipa"

    artifacts:
      - build/ios/ipa/*.ipa

  # ── Android APKs ───────────────────────────────────────────────────────────
  android-release:
    name: Android APKs
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build release APKs
        script: flutter build apk --release --split-per-abi

    artifacts:
      - build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - build/app/outputs/flutter-apk/app-x86_64-release.apk

  # ── Both platforms in one run ──────────────────────────────────────────────
  all-release:
    name: iOS + Android
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      java: 17

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build APKs
        script: flutter build apk --release --split-per-abi

      - name: Build IPA (unsigned)
        script: flutter build ipa --release --no-codesign

      - name: Rename IPA
        script: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          mv build/ios/ipa/*.ipa "build/ios/ipa/Catalyst-${VERSION}.ipa"

    artifacts:
      - build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - build/app/outputs/flutter-apk/app-x86_64-release.apk
      - build/ios/ipa/*.ipa
