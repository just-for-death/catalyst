workflows:
  ios-release:
    name: iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.38.2
      xcode: latest
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build IPA
        script: flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
